<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>✨ Random Quote Generator</h1>

<div class="tabs">
    <button class="tab-btn" onclick="changeCategory('motivational')">💪 Motivational</button>
    <button class="tab-btn" onclick="changeCategory('god')">🙏 God</button>
    <button class="tab-btn" onclick="changeCategory('morning')">🌅 Morning</button>
    <button class="tab-btn" onclick="changeCategory('study')">📚 Study</button>
    <button class="tab-btn" onclick="changeCategory('programming')">💻 Programming</button>
</div>

<div class="quote-box">
    <p id="quote"></p>
    <h3 id="author"></h3>
</div>

<button id="newQuoteBtn">🔄 New Quote</button>
</div>

<script src="script.js"></script>

</body>
</html>
